<!DOCTYPE html>
<html>
<head>
    <title>Server Status</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #333; }
        .status { background: #e8f5e9; padding: 20px; border-radius: 5px; margin: 20px 0; }
        .error { background: #ffebee; padding: 20px; border-radius: 5px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HTTP Server Status</h1>
        
        <div id="content">
            <p>Loading...</p>
        </div>
        
        <button onclick="loadStats()">Refresh Stats</button>
    </div>
    
    <script>
        function loadStats() {
            const content = document.getElementById('content');
            content.innerHTML = '<p>Loading stats...</p>';
            
            fetch('/api/stats')
                .then(response => {
                    console.log('Got response, status:', response.status);
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log('Got text:', text.substring(0, 100));
                    const data = JSON.parse(text);
                    displayStats(data);
                })
                .catch(error => {
                    console.error('Error:', error);
                    content.innerHTML = '<div class="error"><h2>Error</h2><p>' + error.message + '</p></div>';
                });
        }
        
        function displayStats(stats) {
            const html = `
                <div class="status">
                    <h2>Server Statistics</h2>
                    <table border="1" cellpadding="10">
                        <tr><td>Uptime:</td><td>${stats.uptime_seconds}s</td></tr>
                        <tr><td>Total Requests:</td><td>${stats.total_requests}</td></tr>
                        <tr><td>Successful (2xx):</td><td>${stats.successful_2xx}</td></tr>
                        <tr><td>Client Errors (4xx):</td><td>${stats.client_errors_4xx}</td></tr>
                        <tr><td>Server Errors (5xx):</td><td>${stats.server_errors_5xx}</td></tr>
                        <tr><td>Bytes Transferred:</td><td>${stats.bytes_transferred}</td></tr>
                        <tr><td>Active Connections:</td><td>${stats.active_connections}</td></tr>
                        <tr><td>Cache Hits:</td><td>${stats.cache_hits}</td></tr>
                        <tr><td>Cache Misses:</td><td>${stats.cache_misses}</td></tr>
                        <tr><td>Cache Hit Rate:</td><td>${stats.cache_hit_rate.toFixed(1)}%</td></tr>
                        <tr><td>Avg Response Time:</td><td>${stats.avg_response_time_ms.toFixed(2)}ms</td></tr>
                    </table>
                </div>
                <h3>Raw JSON</h3>
                <pre>${JSON.stringify(stats, null, 2)}</pre>
            `;
            document.getElementById('content').innerHTML = html;
        }
        
        // Load on page load
        window.addEventListener('load', loadStats);
    </script>
</body>
</html>
